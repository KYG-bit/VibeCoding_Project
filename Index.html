<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-cell { min-height: 100px; transition: all 0.2s; }
        .day-cell:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 px-4">
        <div class="glass w-full max-w-md rounded-2xl p-8 shadow-2xl">
            <div class="mb-6 text-center">
                <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-blue-100 text-blue-600">
                    <i class="fa-solid fa-dumbbell text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Workout Tracker</h1>
                <p class="text-slate-500">운동 기록을 위해 로그인하세요</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">아이디</label>
                    <input type="text" id="username" class="mt-1 w-full rounded-lg border border-slate-300 p-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="user">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">비밀번호</label>
                    <input type="password" id="password" class="mt-1 w-full rounded-lg border border-slate-300 p-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full rounded-lg bg-blue-600 p-3 font-semibold text-white transition hover:bg-blue-700">로그인</button>
                <p id="login-error" class="hidden text-center text-sm text-red-500">아이디 또는 비밀번호가 틀렸습니다.</p>
            </div>
        </div>
    </div>

    <!-- Main App Content (Hidden by default) -->
    <div id="app-content" class="hidden min-h-screen pb-12">
        <nav class="glass sticky top-0 z-30 mb-8 border-b p-4">
            <div class="container mx-auto flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-calendar-check text-blue-600 text-xl"></i>
                    <span class="text-xl font-bold tracking-tight">MY WORKOUT</span>
                </div>
                <button onclick="handleLogout()" class="text-sm font-medium text-slate-500 hover:text-red-500 transition">
                    로그아웃 <i class="fa-solid fa-right-from-bracket ml-1"></i>
                </button>
            </div>
        </nav>

        <main class="container mx-auto max-w-5xl px-4">
            <!-- Header & Navigation -->
            <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h2 id="current-month-display" class="text-3xl font-bold text-slate-900">2023년 10월</h2>
                <div class="flex items-center space-x-2">
                    <button onclick="changeMonth(-1)" class="rounded-lg bg-white p-2 shadow-sm border border-slate-200 hover:bg-slate-50">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button onclick="goToToday()" class="rounded-lg bg-white px-4 py-2 text-sm font-semibold shadow-sm border border-slate-200 hover:bg-slate-50">오늘</button>
                    <button onclick="changeMonth(1)" class="rounded-lg bg-white p-2 shadow-sm border border-slate-200 hover:bg-slate-50">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- Stats Overview -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
                <div class="glass p-4 rounded-xl shadow-sm border-l-4 border-l-blue-500">
                    <p class="text-xs text-slate-500 font-bold uppercase mb-1">팔굽혀펴기</p>
                    <p id="stat-pushup" class="text-xl font-bold">0회</p>
                </div>
                <div class="glass p-4 rounded-xl shadow-sm border-l-4 border-l-green-500">
                    <p class="text-xs text-slate-500 font-bold uppercase mb-1">계단 오르기</p>
                    <p id="stat-stairs" class="text-xl font-bold">0회</p>
                </div>
                <div class="glass p-4 rounded-xl shadow-sm border-l-4 border-l-orange-500">
                    <p class="text-xs text-slate-500 font-bold uppercase mb-1">러닝 5km</p>
                    <p id="stat-running" class="text-xl font-bold">0회</p>
                </div>
                <div class="glass p-4 rounded-xl shadow-sm border-l-4 border-l-purple-500">
                    <p class="text-xs text-slate-500 font-bold uppercase mb-1">스쿼트</p>
                    <p id="stat-squat" class="text-xl font-bold">0회</p>
                </div>
            </div>

            <!-- Calendar Container -->
            <div class="glass overflow-hidden rounded-2xl shadow-xl">
                <div class="calendar-grid bg-slate-50 border-b border-slate-200 text-center font-bold text-slate-500 text-xs py-3 uppercase tracking-wider">
                    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                </div>
                <div id="calendar-body" class="calendar-grid bg-white">
                    <!-- Days generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Workout Modal -->
    <div id="workout-modal" class="fixed inset-0 z-40 hidden flex items-center justify-center bg-black/50 p-4">
        <div class="glass w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 id="modal-date-title" class="text-xl font-bold mb-4">2023년 10월 27일 운동</h3>
            <div class="space-y-4" id="workout-checklist">
                <label class="flex items-center space-x-3 p-3 rounded-xl border border-slate-100 hover:bg-blue-50 cursor-pointer transition">
                    <input type="checkbox" data-type="pushup" class="h-5 w-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                    <span class="font-medium">팔굽혀펴기 50회</span>
                </label>
                <label class="flex items-center space-x-3 p-3 rounded-xl border border-slate-100 hover:bg-green-50 cursor-pointer transition">
                    <input type="checkbox" data-type="stairs" class="h-5 w-5 rounded border-slate-300 text-green-600 focus:ring-green-500">
                    <span class="font-medium">계단 오르기</span>
                </label>
                <label class="flex items-center space-x-3 p-3 rounded-xl border border-slate-100 hover:bg-orange-50 cursor-pointer transition">
                    <input type="checkbox" data-type="running" class="h-5 w-5 rounded border-slate-300 text-orange-600 focus:ring-orange-500">
                    <span class="font-medium">러닝 5km</span>
                </label>
                <label class="flex items-center space-x-3 p-3 rounded-xl border border-slate-100 hover:bg-purple-50 cursor-pointer transition">
                    <input type="checkbox" data-type="squat" class="h-5 w-5 rounded border-slate-300 text-purple-600 focus:ring-purple-500">
                    <span class="font-medium">스쿼트 50회</span>
                </label>
            </div>
            <div class="mt-6 flex space-x-2">
                <button onclick="closeModal()" class="flex-1 rounded-lg bg-slate-100 py-2 font-semibold text-slate-600 hover:bg-slate-200">취소</button>
                <button onclick="saveWorkout()" class="flex-1 rounded-lg bg-blue-600 py-2 font-semibold text-white hover:bg-blue-700">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let currentDate = new Date();
        let selectedDateStr = "";
        let workoutData = JSON.parse(localStorage.getItem('workoutData')) || {};
        
        // Auth Logic
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'user' && pass === 'userpass') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                renderCalendar();
            } else {
                const error = document.getElementById('login-error');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        }

        function handleLogout() {
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
        }

        // Calendar Logic
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('current-month-display').textContent = `${year}년 ${month + 1}월`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const calendarBody = document.getElementById('calendar-body');
            calendarBody.innerHTML = '';

            // Previous Month Fillers
            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div');
                div.className = 'day-cell border border-slate-100 bg-slate-50/50';
                calendarBody.appendChild(div);
            }

            // Current Month Days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const div = document.createElement('div');
                div.className = 'day-cell border border-slate-100 p-2 cursor-pointer relative flex flex-col items-center justify-between group';
                
                const dayWorkouts = workoutData[dateStr] || {};
                const isToday = new Date().toDateString() === new Date(year, month, day).toDateString();
                
                div.innerHTML = `
                    <span class="text-sm font-semibold ${isToday ? 'bg-blue-600 text-white w-7 h-7 rounded-full flex items-center justify-center' : 'text-slate-600'}">${day}</span>
                    <div class="flex flex-wrap gap-1 justify-center mt-2">
                        ${dayWorkouts.pushup ? '<div class="w-2 h-2 rounded-full bg-blue-500"></div>' : ''}
                        ${dayWorkouts.stairs ? '<div class="w-2 h-2 rounded-full bg-green-500"></div>' : ''}
                        ${dayWorkouts.running ? '<div class="w-2 h-2 rounded-full bg-orange-500"></div>' : ''}
                        ${dayWorkouts.squat ? '<div class="w-2 h-2 rounded-full bg-purple-500"></div>' : ''}
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 text-[10px] text-blue-500 font-bold mt-1 transition-opacity">클릭하여 기록</div>
                `;
                
                div.onclick = () => openModal(dateStr);
                calendarBody.appendChild(div);
            }

            updateStats();
        }

        function updateStats() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            let counts = { pushup: 0, stairs: 0, running: 0, squat: 0 };

            Object.keys(workoutData).forEach(date => {
                const [dYear, dMonth] = date.split('-').map(Number);
                if (dYear === year && dMonth === month) {
                    if (workoutData[date].pushup) counts.pushup++;
                    if (workoutData[date].stairs) counts.stairs++;
                    if (workoutData[date].running) counts.running++;
                    if (workoutData[date].squat) counts.squat++;
                }
            });

            document.getElementById('stat-pushup').textContent = `${counts.pushup}회`;
            document.getElementById('stat-stairs').textContent = `${counts.stairs}회`;
            document.getElementById('stat-running').textContent = `${counts.running}회`;
            document.getElementById('stat-squat').textContent = `${counts.squat}회`;
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // Modal Logic
        function openModal(dateStr) {
            selectedDateStr = dateStr;
            const [y, m, d] = dateStr.split('-');
            document.getElementById('modal-date-title').textContent = `${y}년 ${m}월 ${d}일 운동 기록`;
            
            const data = workoutData[dateStr] || {};
            const checkboxes = document.querySelectorAll('#workout-checklist input');
            checkboxes.forEach(cb => {
                cb.checked = !!data[cb.dataset.type];
            });

            document.getElementById('workout-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('workout-modal').classList.add('hidden');
        }

        function saveWorkout() {
            const checkboxes = document.querySelectorAll('#workout-checklist input');
            const data = {};
            checkboxes.forEach(cb => {
                if (cb.checked) data[cb.dataset.type] = true;
            });

            if (Object.keys(data).length === 0) {
                delete workoutData[selectedDateStr];
            } else {
                workoutData[selectedDateStr] = data;
            }

            localStorage.setItem('workoutData', JSON.stringify(workoutData));
            renderCalendar();
            closeModal();
        }

        // Check if Enter is pressed on login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('login-overlay').classList.contains('hidden')) {
                handleLogin();
            }
        });
    </script>
</body>
</html>
