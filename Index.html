<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 운동 체크리스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1-fr); gap: 8px; }
        .check-item { transition: all 0.2s ease; }
        .check-item:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen">

    <!-- 로그인 섹션 -->
    <div id="login-section" class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">운동 관리 로그인</h2>
                <p class="text-gray-500 mt-2">서비스를 이용하려면 로그인하세요</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">아이디</label>
                    <input type="text" id="username" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="아이디를 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">비밀번호</label>
                    <input type="password" id="password" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="비밀번호를 입력하세요">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition duration-300 mt-4 shadow-lg shadow-blue-200">
                    로그인
                </div>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">아이디 또는 비밀번호가 올바르지 않습니다.</p>
        </div>
    </div>

    <!-- 메인 대시보드 섹션 -->
    <div id="main-section" class="hidden">
        <!-- 네비게이션 -->
        <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                MY WORKOUT
            </h1>
            <button onclick="handleLogout()" class="text-gray-500 hover:text-red-600 text-sm font-medium flex items-center gap-1 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
                </svg>
                로그아웃
            </button>
        </nav>

        <main class="max-w-4xl mx-auto p-4 sm:p-8">
            <!-- 월 선택 헤더 -->
            <div class="flex items-center justify-between mb-8 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h2 id="current-month-display" class="text-2xl font-bold text-gray-800">2023년 10월</h2>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>

            <!-- 캘린더 그리드 -->
            <div id="calendar-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-4">
                <!-- Days will be generated here -->
            </div>
        </main>
    </div>

    <!-- 운동 체크 모달 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modal-date" class="text-xl font-bold text-gray-800">10월 24일 운동</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div id="workout-list" class="space-y-3">
                    <!-- Checkboxes will be generated here -->
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end">
                <button onclick="saveWorkout()" class="bg-blue-600 text-white font-semibold px-6 py-2 rounded-lg hover:bg-blue-700 transition">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        // 초기 데이터 및 상태 관리
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDay = null;
        
        // 목업 데이터 저장소 (세션 동안 유지)
        const workoutData = {}; 

        const exercises = [
            { id: 'pushups', name: '팔 굽혀 펴기 50회' },
            { id: 'stairs', name: '계단 오르기' },
            { id: 'running', name: '러닝 5km' },
            { id: 'squats', name: '스쿼트 50회' }
        ];

        // 로그인 처리
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            if (user === 'user' && pass === 'userpass') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                renderCalendar();
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }

        // 달력 렌더링
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const display = document.getElementById('current-month-display');
            grid.innerHTML = '';
            
            display.innerText = `${currentYear}년 ${currentMonth + 1}월`;
            
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateKey = `${currentYear}-${currentMonth}-${i}`;
                const completedCount = workoutData[dateKey] ? workoutData[dateKey].length : 0;
                const isFull = completedCount === exercises.length;

                const dayCard = document.createElement('div');
                dayCard.className = `bg-white border border-gray-200 rounded-xl p-4 cursor-pointer hover:border-blue-400 hover:shadow-md transition flex flex-col items-center justify-between min-h-[100px] ${isFull ? 'bg-blue-50 border-blue-200' : ''}`;
                dayCard.onclick = () => openModal(i);

                dayCard.innerHTML = `
                    <span class="text-sm font-semibold text-gray-500">${i}일</span>
                    <div class="flex flex-col items-center">
                        <span class="text-xs ${completedCount > 0 ? 'text-blue-600' : 'text-gray-300'} font-bold">
                            ${completedCount}/${exercises.length}
                        </span>
                        <div class="w-full h-1 bg-gray-100 rounded-full mt-1 overflow-hidden min-w-[40px]">
                            <div class="h-full bg-blue-500 transition-all" style="width: ${(completedCount/exercises.length)*100}%"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(dayCard);
            }
        }

        function changeMonth(step) {
            currentMonth += step;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        // 모달 관리
        function openModal(day) {
            selectedDay = day;
            const dateKey = `${currentYear}-${currentMonth}-${day}`;
            const completed = workoutData[dateKey] || [];
            
            document.getElementById('modal-date').innerText = `${currentMonth + 1}월 ${day}일 운동 기록`;
            const list = document.getElementById('workout-list');
            list.innerHTML = '';

            exercises.forEach(ex => {
                const isChecked = completed.includes(ex.id);
                const item = document.createElement('label');
                item.className = `flex items-center justify-between p-4 rounded-xl border ${isChecked ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-white'} cursor-pointer check-item select-none`;
                item.innerHTML = `
                    <span class="font-medium text-gray-700">${ex.name}</span>
                    <input type="checkbox" value="${ex.id}" ${isChecked ? 'checked' : ''} class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                `;
                item.querySelector('input').onchange = (e) => {
                    if (e.target.checked) {
                        item.classList.replace('border-gray-200', 'border-blue-500');
                        item.classList.add('bg-blue-50');
                    } else {
                        item.classList.replace('border-blue-500', 'border-gray-200');
                        item.classList.remove('bg-blue-50');
                    }
                };
                list.appendChild(item);
            });

            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function saveWorkout() {
            const dateKey = `${currentYear}-${currentMonth}-${selectedDay}`;
            const checkboxes = document.querySelectorAll('#workout-list input[type="checkbox"]');
            const completed = [];
            
            checkboxes.forEach(cb => {
                if (cb.checked) completed.push(cb.value);
            });

            workoutData[dateKey] = completed;
            closeModal();
            renderCalendar();
        }

        // ESC 키로 모달 닫기
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
